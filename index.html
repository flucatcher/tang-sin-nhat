<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Biết hôm nay là ngày gì hong ?!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./style/style.css">
</head>
<body>

<button id="mode-toggle" title="Chuyển đổi chế độ sáng/tối">🌙</button>
<button id="music-btn" title="Phát/tạm dừng nhạc nền">🔇</button>

<div class="container">
  <h1>Biết hôm nay là ngày gì hong ?!</h1>
  <img src="https://i.pinimg.com/736x/79/81/88/79818873e3d488ba818c8aaad7ff470c.jpg" alt="Avatar" class="avatar" />

  <h1>Cho bạn dà 3s để xem thư đó</h1>

  <div>
    <button class="btn" id="open-gift-btn" aria-haspopup="dialog" aria-controls="popup" aria-expanded="false">Coi ngay !</button>
    <button class="btn" id="exit-btn" aria-haspopup="dialog">Không coi thì thoi 😔</button>
  </div>
</div>

<div class="popup" id="exit-popup" role="alertdialog" aria-modal="true">
  <center><img src="https://i.pinimg.com/736x/32/a5/4d/32a54dc49f2dbd53374f67b025a3d6c4.jpg" alt="Xin lỗi mà"/></center>
  <h2>Ê không coi thiệt hảaaa 😢</h2>
  <p>Bấm mở coi điiii, năn nỉ á 🥺</p>
  <button class="close-btn" id="close-exit-btn">Okee</button>
</div>

<div class="popup" id="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title" aria-describedby="popup-desc">
  <center><img src="anh-sinh-nhat.jpg" alt="Quà sinh nhật" /></center>
  <h2 id="popup-title">BẤT NGỜ CHƯA !!!</h2>
  <div id="typing-text" aria-live="polite" aria-atomic="true"></div>
  <button class="close-btn" id="close-popup-btn">Đóng</button>
</div>
<canvas id="fireworks"></canvas>

<audio id="bg-music" autoplay loop>
  <source src="./style/nhacht2.m4a" type="audio/mpeg" />
</audio>

<div class="popup" id="guess-age-popup">
  <center><img src="https://i.pinimg.com/736x/d3/13/a8/d313a89d872a9a856594a0a9ec48d120.jpg" alt="Guess age" style="width: 120px;"/></center>
  <h2>Hôm nay bạn dà mí tủi? 🤨</h2>
  <div style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
    <button class="btn age-btn" data-age="16">17 tuổi</button>
    <button class="btn age-btn" data-age="17">19 tuổi</button>
    <button class="btn age-btn" data-age="18">18 tuổi</button>
  </div>
</div>
<script src="./style/script.js"></script>
</body>
</html>
